<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Профиль</title>
<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: #ffffff;
        width: 420px;
        padding: 30px;
        border-radius: 14px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.05);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        font-weight: 500;
    }

    .info {
        margin-bottom: 15px;
    }

    .label {
        font-size: 13px;
        color: #777;
        margin-bottom: 4px;
    }

    .value {
        font-size: 15px;
        font-weight: 500;
        color: #000;
    }

    .divider {
        height: 1px;
        background: #eee;
        margin: 12px 0;
    }
</style>
</head>
<body>

<div class="card">
    <h2>Профиль</h2>

    <div class="info">
        <div class="label">Имя</div>
        <div class="value">Нуржан Аян</div>
    </div>

    <div class="divider"></div>

    <div class="info">
        <div class="label">ИИН</div>
        <div class="value">070411502412</div>
    </div>

    <div class="divider"></div>

    <div class="info">
        <div class="label">Номер телефона</div>
        <div class="value">87054134222</div>
    </div>

    <div class="divider"></div>

    <div class="info">
        <div class="label">Учебное заведение</div>
        <div class="value">Международный университет Астана</div>
    </div>

    <div class="divider"></div>

    <div class="info">
        <div class="label">Факультет</div>
        <div class="value">Информационные системы и технологии</div>
    </div>

</div>

</body>
</html>
